services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.front
    ports:
      - "80:80"
    env_file: .env
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped
  api:
    build:
      context: .
      dockerfile: Dockerfile.back
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
  redis:
    image: redis:8.2.1-alpine3.22
    ports:
      - "6379:6379"
    restart: unless-stopped
    env_file: .env
    command:
      [
        "redis-server",
        "--requirepass",
        "${REDIS_PASSWORD:?REDIS_PASSWORD is not set}",
        "--appendonly",
        "yes",
      ]
    volumes:
      - cache:/data
    healthcheck:
      test: ["CMD-SHELL", 'redis-cli -a "$REDIS_PASSWORD" ping']
      interval: 10s
      timeout: 3s
      retries: 5
volumes:
  cache:
